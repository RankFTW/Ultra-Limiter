name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone dependencies
        run: |
          git clone --depth 1 https://github.com/TsudaKageyu/minhook external/minhook
          git clone --depth 1 --branch v6.7.3 https://github.com/crosire/reshade external/reshade
          git clone --depth 1 https://github.com/NVIDIA/nvapi external/nvapi
          git clone --depth 1 --branch v1.92.5-docking https://github.com/ocornut/imgui external/imgui

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultra_limiter
          path: build/Release/ultra_limiter.addon64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: Ultra_Limiter
          name: Ultra Limiter
          files: build/Release/ultra_limiter.addon64
          make_latest: true
          prerelease: false
